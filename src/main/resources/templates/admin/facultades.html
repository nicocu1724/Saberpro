<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Facultades - Saber Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0d6efd 0%, #000000 100%);
            color: white;
            min-height: 100vh;
        }
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            border: none;
        }
        .table {
            background: rgba(255,255,255,0.95);
            color: black;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/dashboard">SABER PRO</a>
            <a href="/logout" class="btn btn-outline-light">Cerrar Sesión</a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="card p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Gestión de Facultades</h2>
                <a href="/admin/nueva-facultad" class="btn btn-success btn-lg">+ Nueva Facultad</a>
            </div>

            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Nombre de la Facultad</th>
                        <th>Descripción</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="fac : ${facultades}">
                        <td th:text="${fac.id}"></td>
                        <td th:text="${fac.nombre}"></td>
                        <td th:text="${fac.descripcion}"></td>
                        <td>
                            <a th:href="@{/admin/editar-facultad/{id}(id=${fac.id})}" class="btn btn-warning btn-sm">Editar</a>
                            <a th:href="@{/admin/eliminar-facultad/{id}(id=${fac.id})}" class="btn btn-danger btn-sm"
                               onclick="return confirm('¿Eliminar esta facultad?')">Eliminar</a>
                        </td>
                    </tr>
                </tbody>
            </table>
            <a href="/admin/panel" class="btn btn-secondary">← Volver al Panel</a>
        </div>
    </div>
</body>
</html>
