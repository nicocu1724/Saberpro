<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Panel Administrador - Saber Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0d6efd 0%, #000000 100%);
            color: white;
            min-height: 100vh;
        }
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            border: none;
            transition: transform 0.3s;
        }
        .card:hover {
            transform: translateY(-5px);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/dashboard">SABER PRO</a>
            <a href="/logout" class="btn btn-outline-light">Cerrar Sesión</a>
        </div>
    </nav>

    <div class="container mt-5">
        <h2 class="text-center mb-5">Panel de Administrador</h2>
        
        <div class="row g-4">
            <div class="col-md-4">
                <div class="card p-4 text-center h-100">
                    <h4>Gestión de Docentes</h4>
                    <a href="/admin/docentes" class="btn btn-primary mt-3 w-100">Ir a Docentes</a>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-4 text-center h-100">
                    <h4>Gestión de Facultades</h4>
                    <a href="/admin/facultades" class="btn btn-primary mt-3 w-100">Ir a Facultades</a>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-4 text-center h-100">
                    <h4>Todos los Estudiantes</h4>
                    <a href="/admin/estudiantes" class="btn btn-info mt-3 w-100">Ver Estudiantes</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
