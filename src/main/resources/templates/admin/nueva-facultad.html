<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nueva Facultad - Saber Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #0d6efd, #000); color: white; min-height: 100vh; }
        .card { background: rgba(255,255,255,0.1); backdrop-filter: blur(12px); }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/dashboard">SABER PRO</a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="card p-5 mx-auto" style="max-width: 650px;">
            <h2 class="text-center mb-4">Nueva Facultad</h2>
            <form th:action="@{/admin/guardar-facultad}" method="post" th:object="${facultad}">
                <div class="mb-3">
                    <label class="form-label">Nombre de la Facultad</label>
                    <input type="text" class="form-control" th:field="*{nombre}" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Descripción</label>
                    <textarea class="form-control" th:field="*{descripcion}" rows="5"></textarea>
                </div>
                <div class="text-center">
                    <button type="submit" class="btn btn-success btn-lg px-5 me-3">Guardar Facultad</button>
                    <a href="/admin/facultades" class="btn btn-secondary btn-lg px-5">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
