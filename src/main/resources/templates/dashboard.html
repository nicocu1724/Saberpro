<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Saber Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0d6efd 0%, #000000 100%);
            color: white;
            min-height: 100vh;
        }
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            border: none;
            transition: all 0.3s;
        }
        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/dashboard">SABER PRO</a>
            <div class="ms-auto">
                <span class="me-3" th:text="${nombre}"></span> 
                (<span th:text="${rol}" class="text-info"></span>)
                <a href="/logout" class="btn btn-outline-light ms-3">Cerrar Sesión</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h1 class="text-center mb-5 display-5">Bienvenido, <span th:text="${rol}"></span></h1>

        <div class="row g-4 justify-content-center">
            
            <!-- COORDINADOR -->
            <div th:if="${rol == 'COORDINADOR'}" class="col-lg-4 col-md-6">
                <div class="card p-4 text-center h-100">
                    <h4>Gestión de Alumnos</h4>
                    <a href="/coordinador/gestion-alumnos" class="btn btn-success btn-lg w-100 mt-3">Ir a Gestión</a>
                </div>
            </div>
            <div th:if="${rol == 'COORDINADOR'}" class="col-lg-4 col-md-6">
                <div class="card p-4 text-center h-100">
                    <h4>Informes</h4>
                    <a href="/coordinador/informe-general" class="btn btn-info w-100 mt-2">Informe General</a>
                    <a href="/coordinador/informe-detallado" class="btn btn-warning w-100 mt-2">Informe Detallado</a>
                </div>
            </div>

            <!-- ESTUDIANTE -->
            <div th:if="${rol == 'ESTUDIANTE'}" class="col-lg-5">
                <div class="card p-4 text-center h-100">
                    <h4>Mi Portal Estudiante</h4>
                    <a href="/estudiante/portal" class="btn btn-info btn-lg w-100 mt-3">Ver Mis Resultados</a>
                </div>
            </div>

            <!-- ADMIN -->
            <div th:if="${rol == 'ADMIN'}" class="col-lg-4 col-md-6">
                <div class="card p-4 text-center h-100">
                    <h4>Panel Administrador</h4>
                    <a href="/admin/panel" class="btn btn-primary btn-lg w-100 mt-3">Ir al Panel</a>
                </div>
            </div>
            <div th:if="${rol == 'ADMIN'}" class="col-lg-4 col-md-6">
                <div class="card p-4 text-center h-100">
                    <h4>Estudiantes</h4>
                    <a href="/admin/estudiantes" class="btn btn-info btn-lg w-100 mt-3">Ver Todos los Estudiantes</a>
                </div>
            </div>

        </div>
    </div>
</body>
</html>
