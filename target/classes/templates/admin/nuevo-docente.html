<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Docente - Saber Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">
<div class="container mt-5">
    <h2>Nuevo Docente</h2>
    <form th:action="@{/admin/guardar-docente}" method="post" th:object="${usuario}">
        <div class="row">
            <div class="col-md-6 mb-3">
                <label>Documento</label>
                <input type="text" class="form-control" th:field="*{documento}" required>
            </div>
            <div class="col-md-6 mb-3">
                <label>Nombre Completo</label>
                <input type="text" class="form-control" th:field="*{nombreCompleto}" required>
            </div>
        </div>
        <div class="mb-3">
            <label>Email</label>
            <input type="email" class="form-control" th:field="*{email}" required>
        </div>
        <button type="submit" class="btn btn-success">Guardar Docente</button>
        <a href="/admin/docentes" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
</body>
</html>
