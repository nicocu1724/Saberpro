<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Docentes - Saber Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0d6efd 0%, #000000 100%);
            color: white;
            min-height: 100vh;
        }
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: none;
        }
        .table {
            background: rgba(255,255,255,0.95);
            color: black;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/dashboard">SABER PRO</a>
            <a href="/logout" class="btn btn-outline-light">Cerrar Sesión</a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="card p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Gestión de Docentes</h2>
                <a href="/admin/nuevo-docente" class="btn btn-success btn-lg">+ Nuevo Docente</a>
            </div>

            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>Documento</th>
                        <th>Nombre Completo</th>
                        <th>Email</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="doc : ${docentes}">
                        <td th:text="${doc.documento}"></td>
                        <td th:text="${doc.nombreCompleto}"></td>
                        <td th:text="${doc.email}"></td>
                        <td>
                            <a href="#" class="btn btn-warning btn-sm">Editar</a>
                            <a href="#" class="btn btn-danger btn-sm">Eliminar</a>
                        </td>
                    </tr>
                </tbody>
            </table>
            <a href="/admin/panel" class="btn btn-secondary">← Volver al Panel</a>
        </div>
    </div>
</body>
</html>
