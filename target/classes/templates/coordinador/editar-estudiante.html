<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Estudiante - Saber Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0d6efd 0%, #000000 100%);
            color: white;
            min-height: 100vh;
        }
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            border: none;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/dashboard">SABER PRO</a>
            <a href="/logout" class="btn btn-outline-light">Cerrar Sesión</a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="card p-5 mx-auto" style="max-width: 700px;">
            <h2 class="text-center mb-4">Editar Estudiante</h2>
            <form th:action="@{/coordinador/actualizar-estudiante}" method="post" th:object="${usuario}">
                <input type="hidden" th:field="*{id}" />

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Documento</label>
                        <input type="text" class="form-control" th:field="*{documento}" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Nombre Completo</label>
                        <input type="text" class="form-control" th:field="*{nombreCompleto}" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" th:field="*{email}" required>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Programa</label>
                        <input type="text" class="form-control" th:field="*{programa}">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Semestre</label>
                        <input type="text" class="form-control" th:field="*{semestre}">
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Puntaje Global</label>
                        <input type="number" step="0.01" class="form-control" th:field="*{puntajeGlobal}">
                    </div>
                    <div class="col-md-6 mb-3 d-flex align-items-center">
                        <input type="checkbox" class="form-check-input me-2" th:field="*{pagoCargado}">
                        <label class="form-check-label">Pago Cargado</label>
                    </div>
                </div>

                <div class="text-center mt-4">
                    <button type="submit" class="btn btn-warning btn-lg px-5 me-3">Actualizar Estudiante</button>
                    <a href="/coordinador/gestion-alumnos" class="btn btn-secondary btn-lg px-5">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
