<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Alumnos - Saber Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0d6efd 0%, #000000 100%);
            color: white;
            min-height: 100vh;
        }
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
        }
        .table {
            background: rgba(255,255,255,0.95);
            color: black;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/dashboard">SABER PRO</a>
            <a href="/logout" class="btn btn-outline-light">Cerrar Sesión</a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="card p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Gestión de Alumnos</h2>
                <a href="/coordinador/nuevo-estudiante" class="btn btn-success btn-lg">+ Nuevo Estudiante</a>
            </div>

            <!-- Importar Excel -->
            <form method="post" enctype="multipart/form-data" action="/coordinador/importar-excel" class="mb-4">
                <div class="input-group">
                    <input type="file" name="file" accept=".xlsx" class="form-control" required>
                    <button type="submit" class="btn btn-primary">Importar Excel</button>
                </div>
            </form>

            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>Documento</th>
                        <th>Nombre Completo</th>
                        <th>Email</th>
                        <th>Programa</th>
                        <th>Semestre</th>
                        <th>Puntaje Global</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="est : ${estudiantes}">
                        <td th:text="${est.documento}"></td>
                        <td th:text="${est.nombreCompleto}"></td>
                        <td th:text="${est.email}"></td>
                        <td th:text="${est.programa}"></td>
                        <td th:text="${est.semestre}"></td>
                        <td th:text="${est.puntajeGlobal}"></td>
                        <td>
                            <a th:href="@{/coordinador/editar/{id}(id=${est.id})}" class="btn btn-warning btn-sm">Editar</a>
                            <a th:href="@{/coordinador/eliminar/{id}(id=${est.id})}" 
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('¿Estás seguro de eliminar este estudiante?')">Eliminar</a>
                        </td>
                    </tr>
                </tbody>
            </table>
            <a href="/dashboard" class="btn btn-secondary">← Volver al Dashboard</a>
        </div>
    </div>
</body>
</html>
